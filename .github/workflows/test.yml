
name: Автотесты Python

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Запуск тестов
      run: python -m unittest discover -v
